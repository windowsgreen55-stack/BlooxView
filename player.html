<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Flash Player 2010</title>
<link rel="stylesheet" href="style.css">
<style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #flashPlayer { width: 100%; height: 100%; display: flex; flex-direction: column; box-sizing: border-box; }
    video { width: 100%; flex: 1; object-fit: contain; background: #000; }
</style>
</head>
<body>
<div id="flashPlayer" class="flash">
  <video id="video"></video>
  <div class="controls">
    <div class="btn" id="play">▶</div>
    <div class="seek" id="seek"><div class="fill" id="fill"></div></div>
    <div class="time" id="time">00:00 / 00:00</div>
    <div class="btn" id="mute">🔊</div>
    <div class="btn" id="full">⛶</div>
  </div>
</div>
<script src="player.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const vUrl = params.get('v');
    const vid = document.getElementById("video");
    if (vUrl) { vid.src = vUrl; vid.load(); }
    window.addEventListener("message", (e) => {
        if (e.data && e.data.videoUrl) { vid.src = e.data.videoUrl; vid.load(); }
    });
</script>
</body>
</html>
